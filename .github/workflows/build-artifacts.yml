name: Build Artifacts

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: misch-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck frontend
        run: bun run check

      - name: Build static frontend
        env:
          PUBLIC_API_BASE: /misch/api/v1
        run: bun run build

      - name: Package frontend artifact
        run: tar -czf "misch-frontend-${GITHUB_SHA}.tar.gz" -C build .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: misch-frontend-build-${{ github.sha }}
          path: misch-frontend/misch-frontend-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-api-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Type check
        run: cargo check

      - name: Run tests
        run: cargo test --verbose

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/misch-api" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=master

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: misch-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
